<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompt Library — Kanban</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#eef0f3; --card:#ffffff; --ink:#1b1f24; --muted:#5c6470;
    --line:#dfe3e8; --accent:#4f46e5; --chip:#e8eaf6; --chip-ink:#3730a3; --shadow:0 1px 2px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0e1116;--panel:#161b22;--card:#1c222b;--ink:#e6edf3;--muted:#9aa4b2;
      --line:#2a313c;--accent:#8b8cf7;--chip:#242b45;--chip-ink:#b4b8ff;--shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line);
    padding:14px 18px 10px}
  h1{margin:0 0 8px;font-size:18px;font-weight:700;letter-spacing:-.01em}
  h1 span{color:var(--muted);font-weight:500;font-size:13px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  #q{flex:1;min-width:220px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;
    background:var(--card);color:var(--ink);font-size:14px}
  #q:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
  .count{color:var(--muted);font-size:13px;white-space:nowrap}
  .tagbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;max-height:88px;overflow:auto}
  .tag{border:1px solid var(--line);background:var(--chip);color:var(--chip-ink);
    padding:3px 9px;border-radius:999px;font-size:12px;cursor:pointer;user-select:none}
  .tag.on{background:var(--accent);color:#fff;border-color:transparent}
  .clear{color:var(--muted);cursor:pointer;font-size:12px;padding:3px 4px;text-decoration:underline}
  main{display:flex;gap:14px;padding:16px;overflow-x:auto;align-items:flex-start;min-height:60vh}
  .col{flex:0 0 320px;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
  .col.hide{display:none}
  .col h2{margin:0;padding:12px 14px;font-size:13px;font-weight:700;position:sticky;top:0;
    background:var(--panel);border-bottom:1px solid var(--line);border-radius:12px 12px 0 0;
    display:flex;justify-content:space-between;gap:8px}
  .col h2 b{color:var(--muted);font-weight:600}
  .stack{padding:10px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px;
    box-shadow:var(--shadow)}
  .card.hide{display:none}
  .card .t{font-weight:650;font-size:13.5px;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
  .copy{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:6px;
    font-size:11px;padding:2px 7px;cursor:pointer;white-space:nowrap}
  .copy:hover{color:var(--accent);border-color:var(--accent)}
  .card p{margin:0;color:var(--muted);font-size:12.5px;max-height:5.4em;overflow:hidden;
    cursor:pointer;white-space:pre-wrap}
  .card p.open{max-height:none}
  .card .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
  .card .tags span{background:var(--chip);color:var(--chip-ink);font-size:11px;padding:1px 7px;
    border-radius:999px;cursor:pointer}
  .empty{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>Prompt Library <span id="sub">loading…</span></h1>
  <div class="controls">
    <input id="q" type="search" placeholder="Search titles, prompt text, tags…" autocomplete="off">
    <span class="count" id="count"></span>
  </div>
  <div class="tagbar" id="tagbar"></div>
</header>
<main id="board"><div class="empty">Loading prompts…</div></main>

<script src="data.js"></script>
<script>
let DATA=null, activeTags=new Set(), query="";
const board=document.getElementById('board'), tagbar=document.getElementById('tagbar');

if(window.PROMPTS_DATA){DATA=window.PROMPTS_DATA;init();}
else{fetch('prompts.json').then(r=>r.json()).then(d=>{DATA=d;init();})
  .catch(e=>{board.innerHTML='<div class="empty">Could not load prompts — '+e+'</div>';});}

function init(){
  document.getElementById('sub').textContent=DATA.count+' prompts';
  // top tags by frequency
  const freq={};
  DATA.prompts.forEach(p=>p.tags.forEach(t=>freq[t]=(freq[t]||0)+1));
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const frag=document.createDocumentFragment();
  top.forEach(([t,n])=>{
    const el=document.createElement('span');el.className='tag';el.dataset.tag=t;
    el.textContent=t+' ·'+n;el.onclick=()=>toggleTag(t);frag.appendChild(el);
  });
  const clr=document.createElement('span');clr.className='clear';clr.textContent='clear filters';
  clr.onclick=()=>{activeTags.clear();document.getElementById('q').value='';query='';render();};
  tagbar.appendChild(clr);tagbar.appendChild(frag);
  buildBoard();
  document.getElementById('q').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
  render();
}
function toggleTag(t){activeTags.has(t)?activeTags.delete(t):activeTags.add(t);render();}

function buildBoard(){
  board.innerHTML='';
  DATA._cols={};
  DATA.columns.forEach(c=>{
    const col=document.createElement('section');col.className='col';col.dataset.col=c;
    col.innerHTML='<h2>'+c+' <b class="cnt">0</b></h2>';
    const stack=document.createElement('div');stack.className='stack';col.appendChild(stack);
    board.appendChild(col);DATA._cols[c]={col,stack};
  });
  DATA.prompts.forEach((p,i)=>{
    const c=DATA._cols[p.category]||DATA._cols['Other'];
    const card=document.createElement('div');card.className='card';card._p=p;
    const tagsHtml=p.tags.map(t=>'<span data-tag="'+t+'">'+t+'</span>').join('');
    card.innerHTML='<div class="t">'+esc(p.title)+
      '<button class="copy">copy</button></div><p>'+esc(p.prompt)+
      '</p><div class="tags">'+tagsHtml+'</div>';
    card.querySelector('.copy').onclick=ev=>{ev.stopPropagation();
      navigator.clipboard.writeText(p.prompt);ev.target.textContent='copied';
      setTimeout(()=>ev.target.textContent='copy',1200);};
    card.querySelector('p').onclick=e=>e.target.classList.toggle('open');
    card.querySelectorAll('.tags span').forEach(s=>s.onclick=()=>toggleTag(s.dataset.tag));
    card._hay=(p.title+' '+p.prompt+' '+p.tags.join(' ')).toLowerCase();
    c.stack.appendChild(card);
  });
}

function render(){
  // refresh active-state on tagbar
  tagbar.querySelectorAll('.tag').forEach(el=>el.classList.toggle('on',activeTags.has(el.dataset.tag)));
  let shown=0;
  DATA.columns.forEach(c=>{
    const {col,stack}=DATA._cols[c];let n=0;
    stack.querySelectorAll('.card').forEach(card=>{
      const p=card._p;
      const okText=!query||card._hay.includes(query);
      const okTags=activeTags.size===0||[...activeTags].every(t=>p.tags.includes(t));
      const ok=okText&&okTags;
      card.classList.toggle('hide',!ok);
      if(ok){n++;shown++;}
    });
    col.querySelector('.cnt').textContent=n;
    col.classList.toggle('hide',n===0);
  });
  document.getElementById('count').textContent=shown+' shown';
}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
</script>
</body>
</html>
